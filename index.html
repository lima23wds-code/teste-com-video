<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mensagem Especial</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        font-family: "Arial", sans-serif;
      }

      .frase {
        font-size: 2.5rem;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        padding: 20px 40px;
        border: 3px solid white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: pulse 2s infinite;
        margin-bottom: 30px;
      }

      .mensagem {
        font-size: 2rem;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        padding: 15px 30px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        backdrop-filter: blur(5px);
      }

      .coracao {
        color: #ff0000;
        font-size: 2.5rem;
        display: inline-block;
        animation: coracaoBate 1s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes coracaoBate {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="frase">✨ A vida é bela! ✨</div>

    <div class="mensagem">
      HELIALDA, SEU IRMÃO TE AMA <span class="coracao">❤️</span>
    </div>
  </body>
</html>
